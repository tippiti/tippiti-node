name: Regenerate types from latest specification

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate types
        run: npm run generate

      - name: Verify build still passes
        run: npm run build

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet src/generated.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated types
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "tippiti-bot"
          git config user.email "bot@tippiti.io"
          git add src/generated.ts
          git commit -m "Regenerate types from latest specification"
          git push
